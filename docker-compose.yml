version: '3.8'

services:
  # 1. Your FastAPI & LangGraph Backend
  backend:
    build: ./backend  # Assumes your FastAPI Dockerfile is in a 'backend' folder
    container_name: rag_fastapi_backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Add your Vector DB keys or other env vars here
    volumes:
      - ./backend:/app  # Live reload for local development

  # 2. Open WebUI Frontend
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open_webui_frontend
    ports:
      - "3000:8080"
    environment:
      # Route Open WebUI's requests to your FastAPI container
      - OPENAI_API_BASE_URL=http://backend:8000/v1 
      # Open WebUI requires an API key variable to function, even if your backend ignores it
      - OPENAI_API_KEY=sk-dummy-key 
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - backend

volumes:
  open-webui-data: